<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
  <style>
    .flame {
      transform-box: fill-box;
      transform-origin: 50% 88%;
      animation: flame-flicker 0.9s ease-in-out infinite alternate;
    }
    .flame.two { animation-delay: -0.28s; animation-duration: 1.05s; }
    .flame-core {
      transform-box: fill-box;
      transform-origin: 50% 88%;
      animation: core-flicker 0.72s ease-in-out infinite alternate;
    }
    .flame-core.two { animation-delay: -0.18s; }
    @keyframes flame-flicker {
      0% { transform: translateX(-1px) scaleX(0.92) scaleY(1.05) rotate(-3deg); opacity: 0.9; }
      45% { transform: translateX(1px) scaleX(1.08) scaleY(0.96) rotate(2deg); opacity: 1; }
      100% { transform: translateX(0) scaleX(0.98) scaleY(1.12) rotate(4deg); opacity: 0.94; }
    }
    @keyframes core-flicker {
      0% { transform: scaleX(0.84) scaleY(1.04); opacity: 0.72; }
      100% { transform: scaleX(1.08) scaleY(0.92); opacity: 0.94; }
    }
  </style>
  <defs>
    <!-- Flames -->
    <radialGradient id="flame1" cx="50%" cy="70%" r="55%">
      <stop offset="0%" stop-color="#fffde0"/>
      <stop offset="40%" stop-color="#ffc94a"/>
      <stop offset="100%" stop-color="#ff7a00" stop-opacity="0"/>
    </radialGradient>
    <!-- Cake body gradient -->
    <linearGradient id="cakeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f7c8da"/>
      <stop offset="50%" stop-color="#fdeef4"/>
      <stop offset="100%" stop-color="#f5c0d5"/>
    </linearGradient>
    <linearGradient id="cakeSideShade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.24"/>
      <stop offset="45%" stop-color="#d95f93" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#b8005b" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="stripeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e878a7"/>
      <stop offset="50%" stop-color="#f4a5c5"/>
      <stop offset="100%" stop-color="#dd6f9f"/>
    </linearGradient>
    <linearGradient id="creamTopGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="62%" stop-color="#fff7fc"/>
      <stop offset="100%" stop-color="#f2d8e8"/>
    </linearGradient>
    <!-- Number candle gold gradient -->
    <linearGradient id="numberCandle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe875"/>
      <stop offset="48%" stop-color="#ffd34a"/>
      <stop offset="100%" stop-color="#f0a51c"/>
    </linearGradient>
    <!-- Plate gradient -->
    <radialGradient id="plateGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0d8e8"/>
    </radialGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#c0005a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background sparkles -->
  <g fill="#fff" opacity="0.85">
    <path d="M52 70 l4 10 l10 3 l-10 4 l-4 11 l-4-11 l-10-4 l10-3Z"/>
    <path d="M350 55 l3 8 l8 2 l-8 3 l-3 9 l-3-9 l-8-3 l8-2Z"/>
    <path d="M370 190 l2 6 l6 2 l-6 2 l-2 6 l-2-6 l-6-2 l6-2Z"/>
    <path d="M30 210 l2 5 l5 1 l-5 2 l-2 5 l-2-5 l-5-2 l5-1Z"/>
  </g>
  <circle cx="360" cy="240" r="5" fill="#fff" opacity="0.7"/>
  <circle cx="38" cy="150" r="4" fill="#fff" opacity="0.6"/>

  <g filter="url(#shadow)">
    <!-- ── PLATE ── -->
    <ellipse cx="200" cy="312" rx="155" ry="20" fill="url(#plateGrad)"/>

    <!-- ── CAKE BODY ── -->
    <!-- Main rounded cake shape -->
    <rect x="52" y="210" width="296" height="100" rx="10" fill="url(#cakeGrad)"/>
    <rect x="52" y="210" width="296" height="100" rx="10" fill="url(#cakeSideShade)"/>
    <path d="M64 218 C98 210 138 214 174 219 C222 226 281 224 338 214" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" opacity="0.28"/>
    <!-- Pink stripes -->
    <rect x="52" y="228" width="296" height="16" fill="url(#stripeGrad)" rx="2"/>
    <rect x="52" y="262" width="296" height="16" fill="url(#stripeGrad)" rx="2"/>
    <path d="M54 244 H346" stroke="#ffffff" stroke-width="3" opacity="0.18"/>
    <path d="M54 278 H346" stroke="#b9005a" stroke-width="3" opacity="0.09"/>
    <path d="M74 234 C126 241 155 232 202 237 C247 242 286 235 330 239" fill="none" stroke="#ffd9ea" stroke-width="3" opacity="0.42"/>
    <path d="M70 269 C122 276 164 267 209 272 C250 276 288 270 333 273" fill="none" stroke="#ffd9ea" stroke-width="3" opacity="0.36"/>
    <path d="M58 211 v91 c0 6 5 10 11 10 h18 c-8-30-8-66 0-105 H69 c-6 0-11 3-11 4Z" fill="#ffffff" opacity="0.13"/>
    <path d="M331 211 v99 h7 c6 0 10-4 10-10 v-80 c0-6-4-10-10-10Z" fill="#ad0058" opacity="0.09"/>
    <!-- Bottom curve -->
    <ellipse cx="200" cy="310" rx="148" ry="14" fill="#f5c0d5"/>
    <ellipse cx="200" cy="306" rx="138" ry="9" fill="#ffffff" opacity="0.14"/>

    <!-- ── CAKE TOP (cream base) ── -->
    <ellipse cx="200" cy="212" rx="148" ry="22" fill="url(#creamTopGrad)"/>
    <path d="M70 210 C98 236 128 218 142 233 C156 250 181 232 196 240 C218 252 239 224 257 237 C283 255 300 220 331 217 C299 237 260 245 203 242 C143 239 98 230 70 210Z" fill="#ffffff" opacity="0.34"/>
    <path d="M73 218 C110 232 151 236 198 236 C250 236 295 230 328 218" fill="none" stroke="#e8bfd5" stroke-width="4" opacity="0.35"/>

    <!-- ── CREAM PUFFS ── -->
    <circle cx="86"  cy="200" r="22" fill="white"/>
    <circle cx="128" cy="192" r="22" fill="white"/>
    <circle cx="172" cy="188" r="22" fill="white"/>
    <circle cx="216" cy="188" r="22" fill="white"/>
    <circle cx="260" cy="192" r="22" fill="white"/>
    <circle cx="304" cy="200" r="22" fill="white"/>
    <!-- Puff shading -->
    <circle cx="86"  cy="200" r="22" fill="#fce4f0" opacity="0.35"/>
    <circle cx="128" cy="192" r="22" fill="#fce4f0" opacity="0.25"/>
    <circle cx="304" cy="200" r="22" fill="#fce4f0" opacity="0.35"/>

    <!-- ── STRAWBERRIES ── -->
    <!-- Strawberry 1 -->
    <ellipse cx="145" cy="198" rx="18" ry="20" fill="#d93050"/>
    <ellipse cx="145" cy="197" rx="18" ry="20" fill="#e83060" opacity="0.7"/>
    <circle cx="140" cy="194" r="2.5" fill="#fff" opacity="0.7"/>
    <circle cx="150" cy="200" r="2" fill="#fff" opacity="0.5"/>
    <ellipse cx="145" cy="178" rx="7" ry="6" fill="#4aab3c"/>
    <!-- Strawberry 2 -->
    <ellipse cx="200" cy="193" rx="18" ry="20" fill="#d93050"/>
    <ellipse cx="200" cy="192" rx="18" ry="20" fill="#e83060" opacity="0.7"/>
    <circle cx="195" cy="189" r="2.5" fill="#fff" opacity="0.7"/>
    <circle cx="205" cy="195" r="2" fill="#fff" opacity="0.5"/>
    <ellipse cx="200" cy="173" rx="7" ry="6" fill="#4aab3c"/>
    <!-- Strawberry 3 -->
    <ellipse cx="255" cy="198" rx="18" ry="20" fill="#d93050"/>
    <ellipse cx="255" cy="197" rx="18" ry="20" fill="#e83060" opacity="0.7"/>
    <circle cx="250" cy="194" r="2.5" fill="#fff" opacity="0.7"/>
    <circle cx="260" cy="200" r="2" fill="#fff" opacity="0.5"/>
    <ellipse cx="255" cy="178" rx="7" ry="6" fill="#4aab3c"/>

    <!-- ── NUMBER CANDLES ── -->
    <g aria-label="22 candle">
      <text x="162" y="172" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',Arial,sans-serif" font-size="98" font-weight="950"
        fill="#b97810" opacity="0.32" text-anchor="middle" transform="translate(4 7)">2</text>
      <text x="238" y="172" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',Arial,sans-serif" font-size="98" font-weight="950"
        fill="#b97810" opacity="0.32" text-anchor="middle" transform="translate(4 7)">2</text>
      <text x="162" y="172" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',Arial,sans-serif" font-size="98" font-weight="950"
        fill="url(#numberCandle)" stroke="#c47a10" stroke-width="2.5" paint-order="stroke fill" text-anchor="middle">2</text>
      <text x="238" y="172" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',Arial,sans-serif" font-size="98" font-weight="950"
        fill="url(#numberCandle)" stroke="#c47a10" stroke-width="2.5" paint-order="stroke fill" text-anchor="middle">2</text>
      <line x1="162" y1="103" x2="162" y2="88" stroke="#4a2b16" stroke-width="3" stroke-linecap="round"/>
      <line x1="238" y1="103" x2="238" y2="88" stroke="#4a2b16" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- ── FLAMES ── -->
    <ellipse class="flame one" cx="162" cy="77" rx="14" ry="21" fill="url(#flame1)"/>
    <ellipse class="flame-core one" cx="162" cy="80" rx="7"  ry="12"  fill="#fffde0" opacity="0.88"/>
    <ellipse class="flame two" cx="238" cy="77" rx="14" ry="21" fill="url(#flame1)"/>
    <ellipse class="flame-core two" cx="238" cy="80" rx="7"  ry="12"  fill="#fffde0" opacity="0.88"/>
  </g>
</svg>
